interface:
  display_name: "Easy Dev Spec"
  short_description: "仅显式调用的实施级开发 Spec 技能，支持多项目协同与原生选择框逐条追问"
  default_prompt: "仅当用户显式写出 `$easy-dev-spec`、`easy-dev-spec` 或明确要求加载 Easy Dev Spec skill 时使用；不要基于普通需求、技术文档或代码仓库提示自动加载。加载后，先静默分析用户给出的需求、技术文档和代码仓库路径。先展示一份阅读/分析/追问计划，整理待解决问题清单与追问优先级；选择题优先使用原生选择框逐条追问，每题 2-3 个选项，推荐项放第一并标注 (Recommended)，其他/补充交给客户端自带 Other；不可用时才用文本 A/B/C/D 兜底，并沿用每轮最多 3 个问题的旧模式。读取 `.easy-coding/spec/` 时，默认优先参考非 `spec/dev/` 文档，避免把其他需求遗留的 dev spec 混入当前上下文。只有当关键疑问收敛后，才开始生成项目级 dev spec；若涉及多个项目，再补一份跨项目总控文档。所有产出默认统一写到当前工作区，并在结果中提醒用户将目标文档拷贝到对应项目工作区后再引用。分析与文档撰写期间，不能修改业务项目代码。"

policy:
  allow_implicit_invocation: false
